<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doggy Daycare — Vaccine Records</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      color: #1a1a1a;
      background: #f8f9fa;
    }
    h1 { margin: 0 0 0.25rem; font-size: 1.75rem; }
    p.subtitle { margin: 0 0 2rem; color: #555; }
    .upload-section {
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .upload-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }
    input[type="file"] { display: none; }
    button, .file-label {
      font-size: 1rem;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      border: none;
    }
    .file-label {
      background: #e9ecef;
      color: #333;
      display: inline-block;
    }
    .file-label:hover { background: #dee2e6; }
    #upload-btn {
      background: #2563eb;
      color: #fff;
    }
    #upload-btn:hover:not(:disabled) { background: #1d4ed8; }
    #upload-btn:disabled { background: #93b4f5; cursor: not-allowed; }
    #file-name { color: #555; font-size: 0.95rem; }
    #status {
      margin-top: 1rem;
      font-size: 0.95rem;
      min-height: 1.25rem;
    }
    #status.error { color: #b91c1c; }
    #status.loading { color: #555; }
    #results { display: none; }
    #results.visible { display: block; }
    h2 {
      font-size: 1.1rem;
      margin: 1.5rem 0 0.75rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    th, td {
      text-align: left;
      padding: 0.65rem 1rem;
      border-bottom: 1px solid #eee;
    }
    th {
      background: #f1f3f5;
      font-weight: 600;
      font-size: 0.85rem;
    }
    tr:last-child td { border-bottom: none; }
    td.null-value { color: #999; font-style: italic; }
  </style>
</head>
<body>
  <h1>Doggy Daycare</h1>
  <p class="subtitle">Upload a vaccine record to extract information.</p>

  <div class="upload-section">
    <div class="upload-row">
      <label class="file-label" for="document-input">Choose File</label>
      <input type="file" id="document-input" accept=".pdf,.png,.jpg,.jpeg,application/pdf,image/png,image/jpeg">
      <button id="upload-btn" type="button" disabled>Upload Document</button>
      <span id="file-name">No file selected</span>
    </div>
    <div id="status"></div>
  </div>

  <div id="results">
    <h2>Pet &amp; Clinic Information</h2>
    <table id="info-table">
      <thead><tr><th>Field</th><th>Value</th></tr></thead>
      <tbody></tbody>
    </table>

    <h2>Vaccines</h2>
    <table id="vaccines-table">
      <thead id="vaccines-head"></thead>
      <tbody id="vaccines-body"></tbody>
    </table>
  </div>

  <script>
    const fileInput = document.getElementById("document-input");
    const uploadBtn = document.getElementById("upload-btn");
    const fileName = document.getElementById("file-name");
    const status = document.getElementById("status");
    const results = document.getElementById("results");
    const infoTableBody = document.querySelector("#info-table tbody");
    const vaccinesHead = document.getElementById("vaccines-head");
    const vaccinesBody = document.getElementById("vaccines-body");

    const VACCINE_KEYS = ["vaccines", "Vaccines"];

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      uploadBtn.disabled = !file;
      fileName.textContent = file ? file.name : "No file selected";
    });

    uploadBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append("document", file);

      uploadBtn.disabled = true;
      status.className = "loading";
      status.textContent = "Uploading and processing document…";
      results.classList.remove("visible");

      try {
        const response = await fetch("/vaccine", { method: "POST", body: formData });
        const data = await response.json();

        if (!response.ok || data.message) {
          throw new Error(data.message || `Request failed (${response.status})`);
        }

        renderResults(data);
        status.className = "";
        status.textContent = "";
        results.classList.add("visible");
      } catch (err) {
        status.className = "error";
        status.textContent = err.message || "Something went wrong.";
      } finally {
        uploadBtn.disabled = !fileInput.files[0];
      }
    });

    function formatCell(value) {
      if (value === null || value === undefined || value === "") {
        return '<td class="null-value">—</td>';
      }
      return `<td>${escapeHtml(String(value))}</td>`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function getVaccines(data) {
      for (const key of VACCINE_KEYS) {
        if (Array.isArray(data[key])) return data[key];
      }
      return [];
    }

    function renderResults(data) {
      const vaccines = getVaccines(data);
      const infoEntries = Object.entries(data).filter(([key]) => !VACCINE_KEYS.includes(key));

      infoTableBody.innerHTML = infoEntries.map(([key, value]) =>
        `<tr><th>${escapeHtml(key)}</th>${formatCell(value)}</tr>`
      ).join("");

      vaccinesHead.innerHTML = "";
      vaccinesBody.innerHTML = "";

      if (vaccines.length === 0) {
        vaccinesHead.innerHTML = "<tr><th>No vaccines found</th></tr>";
        return;
      }

      const columns = [...new Set(vaccines.flatMap((v) => Object.keys(v)))];
      vaccinesHead.innerHTML = `<tr>${columns.map((c) => `<th>${escapeHtml(c)}</th>`).join("")}</tr>`;
      vaccinesBody.innerHTML = vaccines.map((vaccine) =>
        `<tr>${columns.map((col) => formatCell(vaccine[col])).join("")}</tr>`
      ).join("");
    }
  </script>
</body>
</html>
